# Редирект с HTTP на HTTPS
server {
    listen 80;
    server_name candlesabramova.cz www.candlesabramova.cz;
    return 301 https://candlesabramova.cz$request_uri;
}

# Редирект с www на без www (HTTPS)
server {
    listen 443 ssl http2;
    server_name www.candlesabramova.cz;
    
    ssl_certificate /etc/letsencrypt/live/candlesabramova.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/candlesabramova.cz/privkey.pem;
    
    return 301 https://candlesabramova.cz$request_uri;
}

# Основной сервер
server {
    listen 443 ssl http2;
    server_name candlesabramova.cz;

    ssl_certificate /etc/letsencrypt/live/candlesabramova.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/candlesabramova.cz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /_next/static {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=3600, immutable";
    }

    location /assets {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=3600";
    }

    location /uploads {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 30m;
        add_header Cache-Control "public, max-age=1800";
    }

    location ~* \.(ico|svg|png|jpg|jpeg|webp|gif)$ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location ~* \.(woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;

    access_log /var/log/nginx/abramova-access.log;
    error_log /var/log/nginx/abramova-error.log;
}
